services:
  database:
    image: postgres:14-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  lunachat:
    build:
      context: .
      dockerfile: ./config/rust.Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://${DB_USERNAME}:${DB_PASSWORD}@database:5432/${DB_DATABASE}
      RUST_BACKTRACE: 1
    depends_on:
      - database

  caddy:
    image: caddy:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    env_file: .env
    environment:
      SITE_HOSTNAME: ${SITE_HOSTNAME}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - lunachat

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
